apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
namespace: three-tier-dev
nameSuffix: ""
labels:
  - includeSelectors: false
    pairs:
      app.atlas.io/env: dev

images:
  - name: hashicorp/http-echo
    newTag: "1.0.0"
  - name: nginx
    newTag: "1.27-alpine"
  - name: postgres
    newTag: "15-alpine"

patches:
  - path: replicas-patch.yaml
  - path: resources-patch.yaml
  - path: loglevel-patch.yaml
