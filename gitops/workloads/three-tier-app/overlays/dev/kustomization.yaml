apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - ../../database
namespace: three-tier-dev
nameSuffix: ""
labels:
  - includeSelectors: false
    pairs:
      app.atlas.io/env: dev

images:
  - name: hashicorp/http-echo
    newTag: "1.0.0"
  - name: nginx
    newTag: "1.27-alpine"
  - name: postgres
    newTag: "15-alpine"

patches:
  - path: resources-patch.yaml
  - path: replicas-patch.yaml
  - path: loglevel-patch.yaml

  - path: backend-resources-patch.yaml
    target:
      group: argoproj.io
      version: v1alpha1
      kind: Rollout
      name: backend

  - path: backend-replicas-patch.yaml
    target:
      group: argoproj.io
      version: v1alpha1
      kind: Rollout
      name: backend
