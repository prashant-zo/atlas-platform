# JSON 6902 patch for backend Rollout container resources.
# replaces list elements (wiping image, env, probes) instead of merging.
- op: replace
  path: /spec/template/spec/containers/0/resources
  value:
    requests:
      memory: "32Mi"
      cpu: "25m"
    limits:
      memory: "64Mi"
      cpu: "100m"
