apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: backend
  labels:
    app: backend
    tier: api
spec:
  replicas: 4
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: backend
      app.atlas.io/managed-by: argocd
      app.atlas.io/workload: three-tier-app

  strategy:
    canary:
      scaleDownDelaySeconds: 300
      stableService: backend-svc
      canaryService: backend-svc-canary
      trafficRouting:
        nginx:
          stableIngress: backend
      steps:
        - setWeight: 25
        - analysis:
            templates:
              - templateName: backend-canary-analysis
            args:
              - name: canary-version
                value: "v2"
        - setWeight: 50
        - pause: { duration: 30s }
        - setWeight: 75
        - pause: { duration: 30s }
      canaryMetadata:
        labels:
          rollout-pod-template-hash-version: canary
      stableMetadata:
        labels:
          rollout-pod-template-hash-version: stable

  template:
    metadata:
      labels:
        app: backend
        tier: api
        app.atlas.io/managed-by: argocd
        app.atlas.io/workload: three-tier-app
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z pg-pooler-rw 5432; do
                echo "Waiting for postgres..."
                sleep 3
              done
      containers:
        - name: backend
          image: ghcr.io/prashant-zo/atlas-backend:v2
          ports:
            - name: http
              containerPort: 5678
              protocol: TCP
          envFrom:
            - configMapRef:
                name: backend-config
          env:
            - name: VERSION
              value: "v2"
            - name: PORT
              value: "5678"
            - name: FAIL_RATE
              value: "0"
            - name: LATENCY_MS
              value: "0"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: pg-app
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pg-app
                  key: password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: JWT_SECRET
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /
              port: 5678
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 5678
            initialDelaySeconds: 10
            periodSeconds: 10
