apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
labels:
  - includeSelectors: true
    pairs:
      app.atlas.io/managed-by: argocd
      app.atlas.io/workload: three-tier-app

resources:
  - namespace.yaml
  - secrets.yaml
  - configmap.yaml
  - backend-rollout.yaml  
  - backend-service.yaml
  - frontend.yaml

images:
  - name: hashicorp/http-echo
    newName: hashicorp/http-echo
    newTag: "1.0.0"
  - name: nginx
    newName: nginx
    newTag: "1.27-alpine"
  - name: postgres
    newName: postgres
    newTag: "15-alpine"
