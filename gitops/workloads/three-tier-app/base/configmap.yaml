apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
data:
  NODE_ENV: "production"
  PORT: "3000"
  LOG_LEVEL: "info"
  DB_HOST: "pg-pooler-rw"
  DB_HOST_RO: "pg-ro"
  DB_PORT: "5432"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
data:
  APP_ENV: "production"
  API_URL: "http://backend-svc:3000"
  nginx.conf: |
    server {
      listen 80;
      server_name localhost;
      root /usr/share/nginx/html;
      index index.html;
      location / { try_files $uri $uri/ /index.html; }
      location /api/ {
        proxy_pass http://backend-svc:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
      }
      location /health { return 200 'OK'; add_header Content-Type text/plain; }
    }
