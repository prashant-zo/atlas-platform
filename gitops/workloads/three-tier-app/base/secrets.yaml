apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
type: Opaque
stringData:
  POSTGRES_USER: appuser
  POSTGRES_PASSWORD: ChangeMeInProduction
  POSTGRES_DB: appdb
---
apiVersion: v1
kind: Secret
metadata: 
  name: app-secret
type: Opaque
stringData:
  JWT_SECRET: "change-me-in-production-jwt-secret"
  API_KEY: "change-me-in-production-api-key"
