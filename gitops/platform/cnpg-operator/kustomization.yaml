apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: cloudnative-pg
    repo: https://cloudnative-pg.github.io/charts
    version: 0.22.1
    releaseName: cnpg
    namespace: cnpg-system
    includeCRDs: true
    valuesInline:
      replicaCount: 1

      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 256Mi

      monitoring:
        podMonitorEnabled: false

      config:
        clusterName: atlas

commonLabels:
  app.atlas.io/managed-by: argocd
  app.atlas.io/component: cnpg-operator
