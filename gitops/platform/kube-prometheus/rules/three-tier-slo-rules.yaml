# SLO recording rules for the three-tier-app across all envs.

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: three-tier-slo-rules
  namespace: monitoring
  labels:
    app.atlas.io/managed-by: argocd
    app.atlas.io/component: slo-rules
    release: kps
spec:
  groups:
    - name: three-tier-availability
      interval: 30s
      rules:
        - record: sli:three_tier_db_available:ratio
          expr: |
            (
              max by (namespace) (
                cnpg_collector_up{namespace=~"three-tier-.*"}
              ) == bool 1
            )
            and
            (
              max by (namespace) (
                cnpg_pgbouncer_pools_sv_active{namespace=~"three-tier-.*"}
              ) > bool 0
            )
          labels:
            slo: availability

    - name: three-tier-latency
      interval: 30s
      rules:
        - record: sli:three_tier_db_latency:ratio
          expr: |
            max by (namespace) (
              rate(cnpg_pgbouncer_pools_maxwait_us{namespace=~"three-tier-.*"}[5m])
            ) < bool 50000
          labels:
            slo: latency

    - name: three-tier-backup-freshness
      interval: 30s
      rules:
        - record: sli:three_tier_backup_fresh:ratio
          expr: |
            (
              time() -
              max by (namespace) (
                cnpg_collector_last_available_backup_timestamp{namespace=~"three-tier-.*"}
              )
            ) < bool 93600
          labels:
            slo: backup_freshness
